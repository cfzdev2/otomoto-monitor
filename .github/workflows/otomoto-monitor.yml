name: OTOMOTO Monitor
on:
  workflow_dispatch:
  schedule:
    - cron: "1-59/5 * * * *"
permissions:
  contents: write
concurrency:
  group: otomoto-monitor
  cancel-in-progress: false
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run one scan
        env:
          OTOMOTO_URLS: ${{ secrets.OTOMOTO_URLS }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FIRST_RUN_NOTIFY: "false"
          CHECK_INTERVAL_SECONDS: "300"
          DATABASE_PATH: data/otomoto_monitor.sqlite3
        run: |
          mkdir -p data
          python main.py --once
      - name: Save SQLite state
        run: |
          if [ ! -f data/otomoto_monitor.sqlite3 ]; then
            echo "No SQLite state file created."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/otomoto_monitor.sqlite3
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update OTOMOTO monitor state [skip ci]"
            git pull --rebase
            git push
          fi
